<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MarketLens — NSE/BSE Stock Screener</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%230f172a'/><text y='24' x='4' font-size='22' fill='%2338bdf8'>M</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  /* ─── RESET & BASE ─── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0b0f1a;
    --bg2: #111827;
    --bg3: #1a2236;
    --bg4: #1e2d42;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.13);
    --text: #e2e8f0;
    --text2: #94a3b8;
    --text3: #64748b;
    --blue: #38bdf8;
    --blue-bg: rgba(56,189,248,0.1);
    --green: #4ade80;
    --green-bg: rgba(74,222,128,0.1);
    --green-dark: rgba(74,222,128,0.2);
    --red: #f87171;
    --red-bg: rgba(248,113,113,0.1);
    --red-dark: rgba(248,113,113,0.2);
    --amber: #fbbf24;
    --amber-bg: rgba(251,191,36,0.1);
    --purple: #a78bfa;
    --purple-bg: rgba(167,139,250,0.1);
    --teal: #2dd4bf;
    --radius: 8px;
    --radius-lg: 12px;
    --shadow: 0 4px 24px rgba(0,0,0,0.4);
  }
  html { font-size: 14px; }
  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg2); }
  ::-webkit-scrollbar-thumb { background: var(--bg4); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text3); }

  /* ─── LAYOUT ─── */
  .app { display: flex; flex-direction: column; height: 100vh; }

  /* ─── TOPBAR ─── */
  .topbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 20px; height: 52px;
    background: var(--bg2); border-bottom: 1px solid var(--border);
    flex-shrink: 0; gap: 12px; flex-wrap: wrap;
  }
  .logo {
    font-size: 17px; font-weight: 600; letter-spacing: -0.5px;
    display: flex; align-items: center; gap: 8px; white-space: nowrap;
  }
  .logo-icon {
    width: 28px; height: 28px; background: linear-gradient(135deg, var(--blue), var(--purple));
    border-radius: 7px; display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 700; color: #fff;
  }
  .logo-text { color: var(--text); }
  .logo-text span { color: var(--blue); }
  .badge {
    font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 20px;
    letter-spacing: 0.4px; text-transform: uppercase;
  }
  .badge-live { background: var(--green-bg); color: var(--green); border: 1px solid rgba(74,222,128,0.3); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100% { opacity:1 } 50% { opacity:0.6 } }
  .badge-nse { background: var(--blue-bg); color: var(--blue); }
  .badge-bse { background: var(--amber-bg); color: var(--amber); }
  .topbar-right { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .last-upd { font-size: 11px; color: var(--text3); }
  .btn {
    font-size: 12px; font-weight: 500; padding: 6px 14px; cursor: pointer;
    border: 1px solid var(--border2); border-radius: var(--radius);
    background: var(--bg3); color: var(--text); transition: all 0.15s;
    display: flex; align-items: center; gap: 5px;
  }
  .btn:hover { background: var(--bg4); border-color: var(--blue); color: var(--blue); }
  .btn:disabled { opacity: 0.4; pointer-events: none; }
  .btn-primary { background: var(--blue-bg); color: var(--blue); border-color: rgba(56,189,248,0.4); }
  .btn-primary:hover { background: rgba(56,189,248,0.2); }
  .btn-stop { color: var(--red); border-color: rgba(248,113,113,0.4); background: var(--red-bg); }
  .btn-stop:hover { background: var(--red-dark); }

  /* ─── PROGRESS ─── */
  .progress-wrap { display: none; padding: 0 20px; background: var(--bg2); border-bottom: 1px solid var(--border); }
  .progress-wrap.show { display: block; }
  .progress-info { display: flex; justify-content: space-between; font-size: 11px; color: var(--text2); padding: 6px 0 4px; }
  .progress-bar { height: 2px; background: var(--bg4); border-radius: 1px; margin-bottom: 8px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--blue), var(--purple)); transition: width 0.4s; }

  /* ─── FILTER BAR ─── */
  .filter-bar {
    display: flex; align-items: center; gap: 8px; padding: 10px 20px;
    background: var(--bg2); border-bottom: 1px solid var(--border);
    flex-shrink: 0; flex-wrap: wrap;
  }
  .tab-group { display: flex; gap: 2px; background: var(--bg3); padding: 3px; border-radius: var(--radius); border: 1px solid var(--border); }
  .tab { padding: 4px 11px; font-size: 12px; font-weight: 500; cursor: pointer; border-radius: 6px; border: none; background: transparent; color: var(--text3); transition: all 0.15s; }
  .tab.active { background: var(--bg4); color: var(--text); }
  .tab:hover:not(.active) { color: var(--text2); }

  .idx-group { display: flex; gap: 4px; flex-wrap: wrap; }
  .idx-btn { font-size: 11px; font-weight: 500; padding: 3px 9px; cursor: pointer; border: 1px solid var(--border); border-radius: 20px; background: transparent; color: var(--text3); transition: all 0.15s; }
  .idx-btn:hover { border-color: var(--border2); color: var(--text2); }
  .idx-btn.active { background: var(--blue-bg); color: var(--blue); border-color: rgba(56,189,248,0.4); }

  select, .search-input {
    font-size: 12px; padding: 5px 10px; border-radius: var(--radius);
    border: 1px solid var(--border); background: var(--bg3);
    color: var(--text2); outline: none; transition: border 0.15s;
  }
  select:focus, .search-input:focus { border-color: var(--blue); color: var(--text); }
  select option { background: var(--bg2); }
  .search-input { width: 160px; }
  .search-input::placeholder { color: var(--text3); }
  .spacer { flex: 1; }
  .count-pill { font-size: 11px; font-weight: 500; color: var(--text2); background: var(--bg3); padding: 3px 10px; border-radius: 20px; border: 1px solid var(--border); white-space: nowrap; }

  /* ─── SUMMARY BAR ─── */
  .summary-bar {
    display: grid; grid-template-columns: repeat(7, 1fr); gap: 0;
    background: var(--bg2); border-bottom: 1px solid var(--border); flex-shrink: 0;
  }
  .stat-card { padding: 10px 16px; border-right: 1px solid var(--border); }
  .stat-card:last-child { border-right: none; }
  .stat-lbl { font-size: 10px; font-weight: 500; color: var(--text3); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
  .stat-num { font-size: 20px; font-weight: 600; font-family: 'JetBrains Mono', monospace; }
  .stat-num.green { color: var(--green); }
  .stat-num.red { color: var(--red); }
  .stat-num.amber { color: var(--amber); }
  .stat-sub { font-size: 10px; color: var(--text3); margin-top: 2px; }

  /* ─── MAIN CONTENT ─── */
  .main { flex: 1; overflow-y: auto; padding: 16px 20px; }
  .section-head { display: flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 500; color: var(--text2); margin-bottom: 10px; }
  .dot { width: 7px; height: 7px; border-radius: 50%; }
  .dot-green { background: var(--green); }
  .dot-red { background: var(--red); }
  .dot-gray { background: var(--text3); }

  /* ─── CARDS ─── */
  .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(290px, 1fr)); gap: 10px; margin-bottom: 20px; }
  .stock-card {
    background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius-lg);
    padding: 14px 16px; cursor: pointer; transition: all 0.15s; position: relative; overflow: hidden;
  }
  .stock-card:hover { border-color: var(--border2); transform: translateY(-1px); box-shadow: var(--shadow); }
  .stock-card.bull { border-left: 3px solid var(--green); }
  .stock-card.bear { border-left: 3px solid var(--red); }
  .stock-card.neu { border-left: 3px solid var(--text3); }
  .card-glow { position: absolute; top: 0; right: 0; width: 60px; height: 60px; border-radius: 50%; opacity: 0.04; pointer-events: none; }
  .card-glow.green { background: var(--green); }
  .card-glow.red { background: var(--red); }
  .card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
  .ticker { font-size: 14px; font-weight: 600; font-family: 'JetBrains Mono', monospace; color: var(--text); }
  .ticker-ex { font-size: 9px; font-weight: 500; padding: 1px 5px; border-radius: 3px; margin-left: 4px; background: var(--bg4); color: var(--text3); font-family: 'Inter', sans-serif; }
  .company-name { font-size: 11px; color: var(--text3); margin-top: 2px; max-width: 160px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .price-block { text-align: right; }
  .price { font-size: 14px; font-weight: 600; font-family: 'JetBrains Mono', monospace; }
  .change { font-size: 11px; font-weight: 600; }
  .change.up { color: var(--green); }
  .change.dn { color: var(--red); }
  .card-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 8px; }
  .rec-badge { font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 20px; }
  .rec-sb { background: rgba(74,222,128,0.2); color: #86efac; border: 1px solid rgba(74,222,128,0.3); }
  .rec-b { background: var(--green-bg); color: var(--green); border: 1px solid rgba(74,222,128,0.2); }
  .rec-s { background: var(--red-bg); color: var(--red); border: 1px solid rgba(248,113,113,0.2); }
  .rec-ss { background: rgba(248,113,113,0.2); color: #fca5a5; border: 1px solid rgba(248,113,113,0.3); }
  .rec-h { background: var(--bg3); color: var(--text3); border: 1px solid var(--border); }
  .rec-w { background: var(--amber-bg); color: var(--amber); border: 1px solid rgba(251,191,36,0.2); }
  .tag { font-size: 9px; font-weight: 500; padding: 1px 6px; border-radius: 20px; }
  .tag-bull { background: var(--green-bg); color: var(--green); }
  .tag-bear { background: var(--red-bg); color: var(--red); }
  .tag-warn { background: var(--amber-bg); color: var(--amber); }
  .tag-info { background: var(--blue-bg); color: var(--blue); }
  .card-metrics { display: grid; grid-template-columns: repeat(3,1fr); gap: 4px; padding-top: 8px; border-top: 1px solid var(--border); }
  .metric-lbl { font-size: 9px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.3px; }
  .metric-val { font-size: 12px; font-weight: 600; font-family: 'JetBrains Mono', monospace; margin-top: 2px; }
  .metric-val.hi { color: var(--amber); }

  /* ─── TABLE ─── */
  .table-wrap { overflow-x: auto; border: 1px solid var(--border); border-radius: var(--radius-lg); }
  table { width: 100%; border-collapse: collapse; font-size: 12px; }
  thead { background: var(--bg3); position: sticky; top: 0; z-index: 2; }
  th { font-size: 10px; font-weight: 600; color: var(--text3); text-align: left; padding: 8px 12px; border-bottom: 1px solid var(--border); white-space: nowrap; cursor: pointer; user-select: none; text-transform: uppercase; letter-spacing: 0.3px; }
  th:hover { color: var(--text); }
  td { padding: 8px 12px; border-bottom: 1px solid var(--border); white-space: nowrap; vertical-align: middle; }
  tbody tr:last-child td { border-bottom: none; }
  tbody tr { cursor: pointer; transition: background 0.1s; }
  tbody tr:hover { background: var(--bg3); }
  .td-ticker { font-family: 'JetBrains Mono', monospace; font-weight: 600; font-size: 12px; }
  .td-ex { font-size: 9px; color: var(--text3); margin-top: 1px; }
  .td-name { color: var(--text2); max-width: 150px; overflow: hidden; text-overflow: ellipsis; }

  /* ─── SECTORS ─── */
  .sectors-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap: 10px; margin-bottom: 20px; }
  .sector-card {
    background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius-lg);
    padding: 14px; cursor: pointer; transition: all 0.15s;
  }
  .sector-card:hover { border-color: var(--blue); transform: translateY(-1px); }
  .sector-name { font-size: 13px; font-weight: 600; margin-bottom: 4px; }
  .sector-count { font-size: 11px; color: var(--text3); }
  .sector-change { font-size: 13px; font-weight: 600; font-family: 'JetBrains Mono', monospace; margin-top: 6px; }
  .sector-stats { font-size: 10px; color: var(--text3); margin-top: 2px; }
  .sector-bar-wrap { height: 3px; background: var(--bg4); border-radius: 2px; margin-top: 8px; overflow: hidden; }
  .sector-bar-fill { height: 100%; border-radius: 2px; }

  /* ─── WELCOME ─── */
  .welcome {
    background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius-lg);
    padding: 28px; margin-bottom: 16px;
  }
  .welcome-title { font-size: 18px; font-weight: 600; margin-bottom: 8px; }
  .welcome-sub { font-size: 13px; color: var(--text2); line-height: 1.7; margin-bottom: 20px; }
  .welcome-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; margin-bottom: 20px; }
  .feature-card { background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 14px; }
  .feature-icon { font-size: 20px; margin-bottom: 6px; }
  .feature-title { font-size: 12px; font-weight: 600; margin-bottom: 3px; }
  .feature-desc { font-size: 11px; color: var(--text3); line-height: 1.5; }
  .add-custom-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; padding-top: 16px; border-top: 1px solid var(--border); }
  .custom-input { flex: 1; min-width: 160px; max-width: 220px; font-size: 12px; padding: 6px 10px; border-radius: var(--radius); border: 1px solid var(--border); background: var(--bg3); color: var(--text); outline: none; }
  .custom-input:focus { border-color: var(--blue); }
  .custom-input::placeholder { color: var(--text3); }

  /* ─── DETAIL PANEL ─── */
  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 99; display: none; backdrop-filter: blur(2px); }
  .overlay.show { display: block; }
  .detail-panel {
    position: fixed; top: 0; right: 0; width: 380px; height: 100%;
    background: var(--bg2); border-left: 1px solid var(--border2);
    z-index: 100; transform: translateX(100%); transition: transform 0.22s cubic-bezier(0.4,0,0.2,1);
    display: flex; flex-direction: column; overflow: hidden;
  }
  .detail-panel.open { transform: translateX(0); }
  .panel-header { padding: 16px 20px; border-bottom: 1px solid var(--border); flex-shrink: 0; position: relative; }
  .panel-close { position: absolute; top: 14px; right: 14px; background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius); width: 28px; height: 28px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--text3); font-size: 14px; transition: all 0.15s; }
  .panel-close:hover { color: var(--text); border-color: var(--border2); }
  .panel-ticker { font-size: 20px; font-weight: 700; font-family: 'JetBrains Mono', monospace; }
  .panel-name { font-size: 12px; color: var(--text3); margin-top: 2px; margin-right: 36px; }
  .panel-price { font-size: 28px; font-weight: 700; font-family: 'JetBrains Mono', monospace; margin-top: 10px; }
  .panel-body { flex: 1; overflow-y: auto; padding: 16px 20px; }
  .panel-section { margin-bottom: 16px; }
  .panel-section-title { font-size: 10px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 8px; }
  .signal-row { display: flex; align-items: center; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid var(--border); font-size: 12px; }
  .signal-row:last-child { border-bottom: none; }
  .signal-name { color: var(--text2); }
  .signal-val { font-weight: 600; font-family: 'JetBrains Mono', monospace; }
  .signal-val.bull { color: var(--green); }
  .signal-val.bear { color: var(--red); }
  .signal-val.neu { color: var(--text3); }
  .score-wrap { margin: 10px 0; }
  .score-labels { display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 5px; }
  .score-bar { height: 6px; background: var(--bg4); border-radius: 3px; overflow: hidden; }
  .score-fill { height: 100%; border-radius: 3px; transition: width 0.6s; }
  .panel-action-btn {
    width: 100%; padding: 10px; font-size: 13px; font-weight: 500; cursor: pointer;
    background: var(--blue-bg); color: var(--blue); border: 1px solid rgba(56,189,248,0.3);
    border-radius: var(--radius); transition: all 0.15s; margin-top: 4px;
  }
  .panel-action-btn:hover { background: rgba(56,189,248,0.2); }
  .kv-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1px; background: var(--border); border-radius: var(--radius); overflow: hidden; border: 1px solid var(--border); }
  .kv-item { background: var(--bg3); padding: 8px 10px; }
  .kv-label { font-size: 10px; color: var(--text3); margin-bottom: 2px; }
  .kv-value { font-size: 12px; font-weight: 600; font-family: 'JetBrains Mono', monospace; }

  /* ─── LOADING ─── */
  .loading-state { display: flex; align-items: center; gap: 10px; padding: 40px; color: var(--text2); }
  .spinner { width: 18px; height: 18px; border: 2px solid var(--bg4); border-top-color: var(--blue); border-radius: 50%; animation: spin 0.7s linear infinite; flex-shrink: 0; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .empty-state { text-align: center; padding: 60px 20px; color: var(--text3); }
  .empty-state svg { margin-bottom: 12px; opacity: 0.3; }
  .empty-state p { font-size: 14px; }

  /* ─── MINI CHART ─── */
  .sparkline { display: block; }

  /* ─── RESPONSIVE ─── */
  @media (max-width: 768px) {
    .summary-bar { grid-template-columns: repeat(4,1fr); }
    .stat-card:nth-child(n+5) { display: none; }
    .detail-panel { width: 100%; }
    .filter-bar { padding: 8px 12px; }
    .main { padding: 12px; }
  }
  @media (max-width: 480px) {
    .summary-bar { grid-template-columns: repeat(2,1fr); }
    .stat-card:nth-child(n+3) { display: none; }
  }
</style>
</head>
<body>
<div class="app">

  <!-- TOPBAR -->
  <div class="topbar">
    <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
      <div class="logo">
        <div class="logo-icon">M</div>
        <div class="logo-text">Market<span>Lens</span></div>
      </div>
      <span class="badge badge-live">● Live</span>
      <span class="badge badge-nse">NSE</span>
      <span class="badge badge-bse">BSE</span>
    </div>
    <div class="topbar-right">
      <div class="last-upd" id="lastUpd">Not loaded yet</div>
      <button class="btn btn-stop" id="stopBtn" onclick="stopLoad()" style="display:none">■ Stop</button>
      <button class="btn btn-primary" id="loadBtn" onclick="startLoad()">↻ Load &amp; Screen</button>
    </div>
  </div>

  <!-- PROGRESS -->
  <div class="progress-wrap" id="progressWrap">
    <div class="progress-info">
      <span id="progressText">Fetching stocks...</span>
      <span id="progressPct">0%</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  </div>

  <!-- FILTER BAR -->
  <div class="filter-bar">
    <div class="tab-group">
      <button class="tab active" onclick="switchView('cards',this)">⊞ Cards</button>
      <button class="tab" onclick="switchView('table',this)">≡ Table</button>
      <button class="tab" onclick="switchView('sectors',this)">◉ Sectors</button>
    </div>
    <div class="idx-group" id="idxGroup">
      <button class="idx-btn active" onclick="setIdx('all',this)">All</button>
      <button class="idx-btn" onclick="setIdx('nifty50',this)">Nifty 50</button>
      <button class="idx-btn" onclick="setIdx('nifty100',this)">Nifty 100</button>
      <button class="idx-btn" onclick="setIdx('nifty200',this)">Nifty 200</button>
      <button class="idx-btn" onclick="setIdx('bse100',this)">BSE 100</button>
      <button class="idx-btn" onclick="setIdx('midcap',this)">Midcap</button>
      <button class="idx-btn" onclick="setIdx('smallcap',this)">Smallcap</button>
    </div>
    <select id="sigFilter" onchange="applyFilters()">
      <option value="all">All Signals</option>
      <option value="Strong Buy">Strong Buy</option>
      <option value="Buy">Buy</option>
      <option value="Hold">Hold</option>
      <option value="Watch">Watch</option>
      <option value="Sell">Sell</option>
      <option value="Strong Sell">Strong Sell</option>
    </select>
    <select id="secFilter" onchange="applyFilters()">
      <option value="all">All Sectors</option>
    </select>
    <select id="sortSel" onchange="applyFilters()">
      <option value="score">Sort: Bull Score</option>
      <option value="change">Sort: % Change</option>
      <option value="volume">Sort: Volume Ratio</option>
      <option value="price">Sort: Price</option>
      <option value="mktcap">Sort: Market Cap</option>
    </select>
    <input class="search-input" type="text" placeholder="🔍 Search ticker / name…" oninput="applyFilters()" id="searchBox">
    <div class="spacer"></div>
    <div class="count-pill" id="countPill">0 stocks</div>
  </div>

  <!-- SUMMARY BAR -->
  <div class="summary-bar">
    <div class="stat-card"><div class="stat-lbl">Screened</div><div class="stat-num" id="sTot">—</div><div class="stat-sub">stocks loaded</div></div>
    <div class="stat-card"><div class="stat-lbl">Strong Buy</div><div class="stat-num green" id="sSB">—</div><div class="stat-sub">high conviction</div></div>
    <div class="stat-card"><div class="stat-lbl">Buy</div><div class="stat-num green" id="sBuy">—</div><div class="stat-sub">bullish</div></div>
    <div class="stat-card"><div class="stat-lbl">Sell / SS</div><div class="stat-num red" id="sSell">—</div><div class="stat-sub">bearish</div></div>
    <div class="stat-card"><div class="stat-lbl">Vol Breakout</div><div class="stat-num amber" id="sVol">—</div><div class="stat-sub">&gt;2× avg volume</div></div>
    <div class="stat-card"><div class="stat-lbl">Reversals</div><div class="stat-num" id="sRev">—</div><div class="stat-sub">trend flips</div></div>
    <div class="stat-card"><div class="stat-lbl">Avg Change</div><div class="stat-num" id="sAvg">—</div><div class="stat-sub">today</div></div>
  </div>

  <!-- MAIN -->
  <div class="main" id="main"></div>

</div><!-- .app -->

<!-- OVERLAY + PANEL -->
<div class="overlay" id="overlay" onclick="closePanel()"></div>
<div class="detail-panel" id="detailPanel">
  <div class="panel-header">
    <button class="panel-close" onclick="closePanel()">✕</button>
    <div class="panel-ticker" id="panelTicker">—</div>
    <div class="panel-name" id="panelName">—</div>
    <div class="panel-price" id="panelPrice">—</div>
    <div style="display:flex;align-items:center;gap:6px;margin-top:4px">
      <span class="change" id="panelChange">—</span>
      <span class="rec-badge" id="panelRec">—</span>
    </div>
  </div>
  <div class="panel-body" id="panelBody"></div>
</div>

<script src="stocks.js"></script>
<script src="app.js"></script>
</body>
